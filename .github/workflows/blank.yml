name: Extract ZIP and Commit

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract ZIP
        run: |
          unzip -o "ReadXHub-v2-UPDATED.zip" -d .

      - name: Remove ZIP (optional)
        run: rm -f "ReadXHub-v2-UPDATED.zip"

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          git diff --staged --quiet || git commit -m "Auto extract ReadXHub-v2-UPDATED.zip"

          git push
